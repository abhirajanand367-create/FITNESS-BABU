<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00b4ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="60%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1e2a4a"/>
    </linearGradient>
    <linearGradient id="sunG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="mountG1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a3a5c"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="mountG2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="mountG3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f1f3a"/>
      <stop offset="100%" stop-color="#0a1425"/>
    </linearGradient>
    <linearGradient id="snowG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8e6f0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSun">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer hexagon -->
  <polygon points="200,12 364,100 364,300 200,388 36,300 36,100" fill="none" stroke="url(#g1)" stroke-width="6" filter="url(#glow)"/>
  <polygon points="200,24 348,104 348,296 200,376 52,296 52,104" fill="url(#g2)" stroke="rgba(0,255,136,0.15)" stroke-width="1"/>

  <!-- Inner decorative hexagon ring -->
  <polygon points="200,38 332,114 332,286 200,362 68,286 68,114" fill="none" stroke="rgba(0,255,136,0.08)" stroke-width="1" stroke-dasharray="6,8"/>

  <!-- Background stars/dots -->
  <circle cx="90" cy="80" r="2" fill="rgba(0,255,136,0.4)"/>
  <circle cx="310" cy="70" r="1.5" fill="rgba(0,180,255,0.4)"/>
  <circle cx="320" cy="140" r="1" fill="rgba(0,255,136,0.3)"/>
  <circle cx="80" cy="130" r="1.5" fill="rgba(0,180,255,0.3)"/>
  <circle cx="300" cy="90" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="100" cy="100" r="1" fill="rgba(255,255,255,0.2)"/>

  <!-- Sun glow -->
  <circle cx="200" cy="170" r="50" fill="rgba(0,255,136,0.05)" filter="url(#glowSun)"/>
  <circle cx="200" cy="170" r="35" fill="rgba(0,255,136,0.08)" filter="url(#glowSun)"/>

  <!-- Sun rays -->
  <g opacity="0.15" stroke="url(#sunG)" stroke-width="1.5">
    <line x1="200" y1="120" x2="200" y2="100"/>
    <line x1="230" y1="130" x2="243" y2="114"/>
    <line x1="250" y1="155" x2="268" y2="148"/>
    <line x1="170" y1="130" x2="157" y2="114"/>
    <line x1="150" y1="155" x2="132" y2="148"/>
  </g>

  <!-- Rising sun -->
  <circle cx="200" cy="180" r="28" fill="url(#sunG)" filter="url(#glowSun)" opacity="0.9"/>

  <!-- Mountain range - back -->
  <polygon points="80,260 120,180 160,230 200,165 240,210 280,175 320,240 340,230 340,300 60,300" fill="url(#mountG1)"/>
  <!-- Snow cap - back mountain 1 -->
  <polygon points="115,190 120,180 125,186 123,190 118,192 115,190" fill="url(#snowG)" opacity="0.8"/>
  <!-- Snow cap - back mountain 2 (peak) -->
  <polygon points="193,172 200,165 207,172 204,176 196,176 193,172" fill="url(#snowG)" opacity="0.9"/>
  <!-- Snow cap - back mountain 3 -->
  <polygon points="275,182 280,175 285,180 282,184 278,184 275,182" fill="url(#snowG)" opacity="0.8"/>

  <!-- Mountain range - mid -->
  <polygon points="60,280 110,210 150,250 195,195 240,240 290,205 340,260 340,300 60,300" fill="url(#mountG2)"/>
  <!-- Snow cap - mid mountain 1 -->
  <polygon points="105,218 110,210 115,216 112,220 108,220 105,218" fill="url(#snowG)" opacity="0.7"/>
  <!-- Snow cap - mid mountain 2 (center) -->
  <polygon points="190,202 195,195 200,200 197,205 193,205 190,202" fill="url(#snowG)" opacity="0.85"/>
  <!-- Snow cap - mid mountain 3 -->
  <polygon points="286,212 290,205 295,210 292,214 288,214 286,212" fill="url(#snowG)" opacity="0.7"/>

  <!-- Mountain range - front -->
  <polygon points="60,300 110,235 160,270 210,225 260,260 310,230 340,270 340,300" fill="url(#mountG3)"/>
  <!-- Snow cap - front mountain 1 -->
  <polygon points="105,242 110,235 115,240 112,244 108,244 105,242" fill="url(#snowG)" opacity="0.6"/>
  <!-- Snow cap - front mountain 2 -->
  <polygon points="206,232 210,225 214,230 212,234 208,234 206,232" fill="url(#snowG)" opacity="0.7"/>

  <!-- Heartbeat line -->
  <polyline points="80,255 110,255 125,235 140,260 155,240 170,250 185,220 195,248 205,210 215,245 225,230 240,250 255,235 270,255 300,255 320,270" fill="none" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Dumbbell at base -->
  <g transform="translate(200,310)">
    <!-- Bar -->
    <rect x="-50" y="-6" width="100" height="12" rx="4" fill="url(#g1)" filter="url(#glow)"/>
    <rect x="-50" y="-6" width="100" height="12" rx="4" fill="rgba(0,255,136,0.3)"/>
    <!-- Left weight -->
    <rect x="-68" y="-16" width="22" height="32" rx="6" fill="url(#g1)"/>
    <rect x="-60" y="-22" width="6" height="44" rx="3" fill="url(#g1)"/>
    <!-- Right weight -->
    <rect x="46" y="-16" width="22" height="32" rx="6" fill="url(#g1)"/>
    <rect x="54" y="-22" width="6" height="44" rx="3" fill="url(#g1)"/>
  </g>

  <!-- Text banner -->
  <g transform="translate(200,355)">
    <rect x="-75" y="-12" width="150" height="24" rx="12" fill="rgba(0,255,136,0.1)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="15" letter-spacing="3" fill="url(#g1)" filter="url(#glow)">FITHOMEY</text>
  </g>

  <!-- Small accent dots at hexagon points -->
  <circle cx="200" cy="12" r="4" fill="url(#g1)"/>
  <circle cx="364" cy="100" r="4" fill="url(#g1)"/>
  <circle cx="364" cy="300" r="4" fill="url(#g1)"/>
  <circle cx="200" cy="388" r="4" fill="url(#g1)"/>
  <circle cx="36" cy="300" r="4" fill="url(#g1)"/>
  <circle cx="36" cy="100" r="4" fill="url(#g1)"/>
</svg>